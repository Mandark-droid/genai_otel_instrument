name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual triggering for testing

# Least privilege: default the whole workflow to read-only. The publish job
# below declares exactly what it needs.
permissions:
  contents: read

# Action-pinning note: official actions/* are pinned by major tag; third-party
# actions should be pinned to a full commit SHA. Prefer replacing every `@vN`
# with `@<40-char-sha>  # vN` once verified.

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    # This job holds long-lived PyPI tokens (secrets.*_PYPI_API_TOKEN). Keep the
    # GITHUB_TOKEN read-only.
    #
    # RECOMMENDED HARDENING (additive, not yet enabled):
    #   1. OIDC Trusted Publishing removes the long-lived tokens entirely. To
    #      switch, register this repo/workflow as a Trusted Publisher on PyPI,
    #      uncomment `id-token: write` below, and use the commented
    #      `pypa/gh-action-pypi-publish` step further down instead of twine.
    #   2. SUPPLY-CHAIN: this job currently runs `pip install -e ".[dev]"` +
    #      pytest (untrusted, unpinned resolve) in the SAME job that carries the
    #      publish token. A compromised/planted dependency would execute code
    #      next to the token. Preferred structure: a separate `build`/`test` job
    #      produces the sdist+wheel as an artifact, and an isolated `publish` job
    #      (no build/test/install steps) only downloads that artifact and uploads
    #      it. Do NOT run untrusted installs in the token-bearing publish job.
    permissions:
      contents: read
      # id-token: write   # <-- uncomment to enable OIDC Trusted Publishing

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history + tags needed for setuptools-scm versioning

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    # Run full test suite before publishing
    - name: Install dev dependencies and run tests
      run: |
        pip install -e ".[dev]"
        pytest tests/ -v --cov=genai_otel --cov-report=term
        echo "✓ All tests passed"

    # Code quality checks
    - name: Format and lint checks
      run: |
        black --check genai_otel tests --exclude='__version__\.py'
        isort --check-only --skip-glob='*/__version__.py' genai_otel tests
        echo "✓ Code quality checks passed"

    - name: Build package
      run: python -m build

    - name: Check package with twine
      run: twine check dist/*

    # Test installation before publishing
    - name: Test package installation
      run: |
        python -m venv test_env
        source test_env/bin/activate
        pip install dist/*.whl

        # Test imports
        python -c 'import genai_otel; print(f"Successfully imported genai_otel version: {genai_otel.__version__}")'
        python -c 'from genai_otel.config import OTelConfig; from genai_otel.cost_calculator import CostCalculator; print("All core components imported successfully")'

        # Test CLI
        genai-instrument --help
        echo "✓ CLI tool works"

        deactivate
        rm -rf test_env

    # ---------------------------------------------------------------------------
    # OIDC Trusted Publishing (RECOMMENDED alternative to the token steps below).
    # This is additive/commented so the maintainer can switch without downtime.
    # To enable: register the Trusted Publisher on PyPI (and Test PyPI), uncomment
    # `id-token: write` in this job's permissions block above, and use these steps
    # INSTEAD of the twine-based "Publish to Test PyPI" / "Publish to PyPI" steps.
    # No PYPI_API_TOKEN / TEST_PYPI_API_TOKEN secrets are needed with OIDC.
    #
    # - name: Publish to Test PyPI (OIDC Trusted Publishing)
    #   if: github.event_name == 'release'
    #   uses: pypa/gh-action-pypi-publish@release/v1   # SHA-pin preferred
    #   with:
    #     repository-url: https://test.pypi.org/legacy/
    #     skip-existing: true
    #
    # - name: Publish to PyPI (OIDC Trusted Publishing)
    #   if: github.event_name == 'release'
    #   uses: pypa/gh-action-pypi-publish@release/v1   # SHA-pin preferred
    # ---------------------------------------------------------------------------

    - name: Publish to Test PyPI
      if: github.event_name == 'release'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.TEST_PYPI_API_TOKEN }}
      run: |
        echo "Publishing to Test PyPI..."
        python -m twine upload --verbose --repository testpypi dist/* --skip-existing || echo "Package may already exist on Test PyPI"
        echo "✓ Published to Test PyPI"

    - name: Wait and verify Test PyPI upload
      if: github.event_name == 'release'
      run: |
        echo "Waiting 30 seconds for Test PyPI to process..."
        sleep 30

        # Extract version from dist filename
        VERSION=$(ls dist/*.whl | head -1 | grep -oP '\d+\.\d+\.\d+[^\-]*' | head -1)
        echo "Package version: $VERSION"

        # Try to install from Test PyPI to verify upload
        python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ genai-otel-instrument==$VERSION --no-cache-dir || echo "Could not verify Test PyPI installation (may need more time to propagate)"

    - name: Publish to PyPI
      if: github.event_name == 'release'
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: |
        echo "Publishing to PyPI..."
        python -m twine upload --verbose dist/*
        echo "✓ Published to PyPI"

    - name: Create release summary
      if: github.event_name == 'release'
      run: |
        echo "## 🎉 Release Published Successfully" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Package Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: $(ls dist/*.whl | head -1 | grep -oP '\d+\.\d+\.\d+[^\-]*' | head -1)" >> $GITHUB_STEP_SUMMARY
        echo "- **TestPyPI**: https://test.pypi.org/project/genai-otel-instrument/" >> $GITHUB_STEP_SUMMARY
        echo "- **PyPI**: https://pypi.org/project/genai-otel-instrument/" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Installation" >> $GITHUB_STEP_SUMMARY
        echo '```bash' >> $GITHUB_STEP_SUMMARY
        echo 'pip install genai-otel-instrument' >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
